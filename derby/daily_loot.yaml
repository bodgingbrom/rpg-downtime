# Daily reward loot tables by rank tier.
# Each entry is a short item name that a racer might "find" between races.
# The LLM uses a few sampled items as inspiration; without the LLM,
# one item is picked at random for the fallback flavor text.

D:
  # Worthless junk — funny, gross, or useless finds
  - a rusty horseshoe
  - a half-eaten apple
  - a cracked monocle
  - someone's lost sock
  - a dented tin cup
  - a handful of lint
  - a muddy boot (just one)
  - a broken compass
  - a tattered map to nowhere
  - a jar of suspicious jam
  - a wooden spoon with bite marks
  - a rock that looks like a face
  - a soggy pamphlet
  - an expired coupon
  - a bent fork
  - a bag of mystery dust
  - a deflated ball
  - a chipped ceramic frog
  - a bundle of twigs tied with string
  - a stale bread roll
  - a rusted belt buckle
  - a crumpled love letter (not for them)
