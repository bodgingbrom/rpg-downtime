# =============================================================================
# THE GOBLIN WARRENS — v2 (RPG-lite overhaul)
# =============================================================================
# Sibling of goblin_warrens.yaml. Admin-gated until cutover (PR 8).
# Reuses the v1 monsters / bosses verbatim and layers the v2 room-pool /
# features / lore_fragments / legendary_reward schema on top.
#
# Floors:
#   1 — The Stolen Mine        (Goblin Chief)
#   2 — The Flooded Tunnels    (Troll Guardian)
#   3 — The Throne Room        (The Goblin King)
#
# Lore: 12 fragments tracing the mine's transition — tin miners, then
# goblins, then the older thing the goblins are unknowingly serving.
# Collecting all 12 unlocks The Goblin King's Crown.
# =============================================================================

id: goblin_warrens
name: "The Goblin Warrens"
description: "A network of damp tunnels beneath the hills, crawling with goblins and worse."

background:
  tone: "Classic dungeon crawl. Dirty, dangerous, a little mean. Low fantasy."
  pitch: "Damp tunnels beneath the hills. Goblins have made a home here, and they're not alone."
  lore: |
    For three seasons the farmsteads above the hills have lost livestock,
    then dogs, then — a month ago — two travelers who went to look for
    the dogs. The townsfolk point to the old tin-mine cut abandoned in
    their grandfather's day. Something has moved in. Something has dug
    deeper. The hills, they say, remember what was down there before the
    tin miners.

    The goblins are the least of the Warrens.
  dm_hooks:
    - "Low ceilings, guttering torches stolen from the farmsteads"
    - "Crude tallies scratched on the walls counting something the goblins have taken"
    - "Deeper down, the stone gets older than any of them"
    - "Standing pools of meltwater that taste faintly of iron"
    - "Symbols cut into the deep stone that were old before goblins existed"
  style_notes: |
    Keep it grounded. The threat is dirty and immediate. Goblins are
    opportunistic little bastards, not cackling theatrical villains.
    Avoid theatrical evil — what's down here is hungry, not malevolent.

# ---------------------------------------------------------------------------
# Lore fragments — from tin miners to goblins to the thing below.
# ---------------------------------------------------------------------------

lore_fragments:
  - id: 1
    text: |
      _A tin miner's journal page. The ink is blocky and patient._

      Started a new face today, third level down. Tom and Pell working
      the seam east. Uncle says the vein turns south here but I think
      he just wants me to find out for myself. Decent ore. Decent enough.

  - id: 2
    text: |
      _Same handwriting, several pages later. The script tighter._

      Pell quit yesterday. Said the noises got into his sleep. I told
      him it's just stone settling, that's what the older men said when
      I started, and they were right then. Tom is uneasy. I am uneasy.
      I wish my uncle had finished his last shift instead of leaving
      it open like that.

  - id: 3
    text: |
      _The last entry in the miner's journal. The nib has bled where
      the writer's hand stopped abruptly._

      We hit something tonight. Not stone. Not metal. The pickaxe sang
      strange against it. Tom won't go near. I am writing this with my
      back against the cart. I do not want to face the cut. Tomorrow
      we close it. Tomorrow we close

  - id: 4
    text: |
      _Crude tally in goblin charcoal, scratched across an entire wall._

      Three columns of strokes. One labeled with a sheep — twenty-two
      strokes. One labeled with a dog — eleven strokes. The third has
      no label at all, only nine careful strokes, and is set apart
      from the others with a deeper line.

  - id: 5
    text: |
      _A child's drawing. Crayon on parchment. Tucked into a satchel
      no one came back for._

      A house with a green roof. Two stick figures, one large, one
      small, holding hands. A third figure, drawn in different colors,
      at a small distance — its arms are too long.

  - id: 6
    text: |
      _Goblin shaman's working notes. The script is half-glyph,
      half-charcoal smear._

      The deep-singers want quiet. We give them quiet. They give us
      the upper-warren in turn. They were here first. Even the chief
      remembers this. We do not dig past the third level. We do not.
      The boy who dug past the third level does not eat with us
      anymore.

  - id: 7
    text: |
      _A pull-toy, wooden, missing one wheel. A name carved into the
      handle in a parent's careful hand: Tilda._

      The toy is stained at the wheel-rim with something dark that has,
      over time, dried and hardened. The carving of the name has been
      gone over twice, as if the parent wanted to be sure it would
      hold.

  - id: 8
    text: |
      _Symbol cut deep into the older stone, beneath the goblin dig.
      You take a rubbing._

      The mark predates the tin miners by a long way. It does not match
      any letter or rune you know. The sense of it, looked at sidelong,
      is **here is a way down to someone who was here first.**

  - id: 9
    text: |
      _A ledger, stolen from the surface, repurposed by the goblin
      king. The original entries are scratched out. New entries are
      written below them in goblin charcoal._

      A list of what has been brought from above. Bolts of cloth.
      A bell. The town's lost mason. An infant's quilt. A bound
      messenger from the next valley over. The list is, in places,
      crossed-through and re-tallied, as if some were not delivered
      where they were supposed to be delivered.

  - id: 10
    text: |
      _Captive's carving on the inside of a pen post. Done with a
      bone — possibly the carver's, possibly not._

      A name (TIBO), the year, and four words: **THE KING IS PAYING.**
      The post above the carving has been chewed on, very recently,
      by something with too many teeth.

  - id: 11
    text: |
      _Treaty, of a kind. The goblin king's mark on one side. On the
      other side, a single blot of dried something dark — a thumbprint
      that is not goblin, not human, and far too large._

      The treaty's terms, in goblin charcoal, are simple: the king
      takes the warrens above. The king feeds the deep. The king does
      not ask the deep its name. The deep does not climb past the
      sealed door.

      The seal on the back is broken.

  - id: 12
    text: |
      _The miner's last entry, after all. Found wedged behind a
      goblin throne that wasn't built when the miner died._

      ...close it tomorrow. We will close it tomorrow. Tomorrow we
      will close it. We will. We

      _Then, in a different ink, in a different hand, finishing the
      sentence the miner could not:_

      ...not.

# ---------------------------------------------------------------------------
# Legendary reward — granted once all 12 fragments are collected.
# ---------------------------------------------------------------------------

legendary_reward:
  item_id: amulet_of_vitality
  name: "The Goblin King's Crown"
  flavor: |
    _The book is complete. Beneath the throne, where the miner's last
    entry was wedged, a small iron-and-tin crown sits in a hollow that
    has been waiting for someone to find it. The hollow's shape suggests
    the crown was once worn by a much larger creature than any goblin._

    _It fits you. It will keep on fitting you. **The Goblin King's Crown**
    is yours._

# ---------------------------------------------------------------------------
# FLOORS
# ---------------------------------------------------------------------------

floors:
  # =========================================================================
  - floor: 1
    theme: the_stolen_mine
    background: |
      The original tin-mine cut, now goblin-occupied. The ceilings are
      low. The torches are stolen. The walls remember what was a working
      mine and what is, now, a den.

    layout:
      rooms_per_run: [5, 6]
      branches: [1, 2]
      branch_length: [1, 1]

    anchors:
      - {position: entrance, room_id: cut_mouth}
      - {position: boss, room_id: chief_chamber}

    wandering_threshold: 6
    wandering_pool:
      - {monster_id: sewer_rat, weight: 100}
      - {monster_id: goblin, weight: 80}
      - {monster_id: giant_spider, weight: 50}

    monsters:
      - id: sewer_rat
        name: Sewer Rat
        description: "A mangy rat the size of a small dog."
        hp: 6
        defense: 0
        attack_dice: "1d4"
        attack_bonus: -1
        xp: 5
        gold: [1, 4]
        ai: {attack: 80, heavy: 20}
        loot:
          - {item_id: worm, chance: 25, type: cross_game_bait}

      - id: goblin
        name: Goblin
        description: "A sneering little wretch with a rusty blade."
        hp: 12
        defense: 0
        attack_dice: "1d4"
        attack_bonus: 1
        xp: 10
        gold: [3, 8]
        ai: {attack: 60, heavy: 20, defend: 20}
        loot:
          - {item_id: health_potion, chance: 15}
          - {item_id: worm, chance: 20, type: cross_game_bait}
          - {item_id: insect, chance: 10, type: cross_game_bait}

      - id: giant_spider
        name: Giant Spider
        description: "Eight legs, eight eyes, and dripping fangs."
        hp: 10
        defense: 0
        attack_dice: "1d4"
        attack_bonus: 0
        xp: 8
        gold: [1, 5]
        ai: {attack: 70, heavy: 30}
        loot:
          - {item_id: worm, chance: 20, type: cross_game_bait}

    boss:
      id: goblin_chief
      name: Goblin Chief
      description: "A hulking goblin in patchwork armor, wielding a jagged cleaver."
      hp: 30
      defense: 1
      attack_dice: "1d6"
      attack_bonus: 2
      xp: 30
      gold: [15, 30]
      ai: {attack: 50, heavy: 30, defend: 20}
      loot:
        - {item_id: shortsword, chance: 100, type: gear}
        - {item_id: worm, chance: 35, type: cross_game_bait}
        - {item_id: insect, chance: 25, type: cross_game_bait}
        - {item_id: shortsword_plus1, chance: 8, type: gear}
        - {item_id: leather_armor_plus1, chance: 8, type: gear}

    room_pool:
      - id: cut_mouth
        weight: 100
        description_pool:
          - "The mouth of the old tin-mine cut, propped with sagging timbers and lit by a single guttering torch. The smell of damp earth — and beneath it, much fainter, the smell of something that hasn't bathed."
        ambient_pool:
          - "Far below, irregular tapping sounds — the kind of tapping someone makes who knows you're listening."
        features:
          - id: miners_pack
            name: "abandoned miner's pack"
            visibility: visible
            investigate_label: "Open the miner's pack"
            noise: 1
            content:
              - {type: gold, amount: [3, 6], chance: 1.0}
              - {type: lore_fragment, fragment_id: 1, chance: 1.0}
            flavor_success: "_The pack is dust-stiff but the buckles still work. Inside: a cracked tin cup, a half-eaten lunch you very much do not eat, and a small leather-bound journal._"
          - id: scratched_warning
            name: "scratched warning"
            visibility: concealed
            perception_dc: 11
            look_hint: "letters scratched, very small, into the back of the doorframe"
            investigate_label: "Lean close to read"
            noise: 1
            content:
              - {type: narrate, text: "_Words in old miner's slang: **dont breathe past the third level.** The carving has been chiseled over by goblins, but not deeply enough._"}

      - id: chief_chamber
        weight: 100
        description_pool:
          - "A wider chamber. The torches here are bigger and angrier. At the back, on a chair built of stolen things, the chief has been waiting for you."

      - id: rotted_timbers
        weight: 100
        description_pool:
          - "A collapsed support gallery. Half the timbers have rotted through; the goblins have repaired them with rope and threats. The repairs are not holding."
        ambient_pool:
          - "The timbers groan when you don't watch them."
        features:
          - id: collapsed_pile
            name: "collapsed timber pile"
            visibility: visible
            investigate_label: "Search the pile"
            noise: 2
            content:
              - {type: gold, amount: [5, 9], chance: 1.0}
              - {type: item, item_id: health_potion, chance: 0.5}
            flavor_success: "_You shift two of the heavier beams. Beneath them, a pouch the goblins missed — its contents are mostly mineworker silver._"
          - id: dropped_pickaxe
            name: "dropped pickaxe"
            visibility: concealed
            perception_dc: 12
            look_hint: "the haft of a pickaxe sticking out where it shouldn't be"
            investigate_label: "Pull the pickaxe loose"
            noise: 2
            content:
              - {type: gold, amount: [3, 6], chance: 1.0}
              - {type: lore_fragment, fragment_id: 2, chance: 1.0}
            flavor_success: "_The pickaxe comes free. Wedged into the haft is a folded page from a journal — the same hand as the pack you opened earlier, several pages on._"

      - id: tally_wall
        weight: 100
        description_pool:
          - "A long stretch of corridor whose walls are covered in goblin tallies, scratched in charcoal and what may not be charcoal. Three columns. One unlabeled."
        features:
          - id: tally_column
            name: "third tally column"
            visibility: visible
            investigate_label: "Count the tallies"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 4, chance: 1.0}
            flavor_success: "_Twenty-two sheep. Eleven dogs. And nine of something the goblins did not feel safe naming. The nine column is set apart on its own line._"

      - id: miners_carrel
        weight: 100
        description_pool:
          - "A small mining-foreman's carrel built into the wall. Stool, lamp-bracket, plank for a desk. The plank is carved through with names — the foreman's, the foreman's wife's, his apprentices', his uncle's."
        features:
          - id: foremans_drawer
            name: "foreman's drawer"
            visibility: visible
            investigate_label: "Force open the drawer"
            noise: 2
            content:
              - {type: gold, amount: [4, 9], chance: 0.8}
              - {type: item, item_id: health_potion, chance: 0.5}
              - {type: lore_fragment, fragment_id: 3, chance: 1.0}
            flavor_success: "_The drawer's lock is rusted but the wood is rotten. It comes open easily. Whoever was using it last didn't get to lock it properly._"

      - id: stolen_kitchens
        weight: 100
        description_pool:
          - "A goblin kitchen built around a stolen iron pot the size of a small bath. The smell is, mercifully, of stew. The stew is not, mercifully, recognizably anything."
        ambient_pool:
          - "The pot is being stirred, very slowly, by a wooden spoon nobody is currently holding."
        features:
          - id: stew_pot
            name: "the great stew pot"
            visibility: visible
            investigate_label: "Look in the pot"
            noise: 2
            content:
              - {type: gold, amount: [4, 8], chance: 1.0}
              - {type: narrate, text: "_The stew is full of bones — most of them small enough to be sheep, none of them quite the right shape for sheep. You don't look further._"}
            flavor_success: "_The stew is hot. The pot is enormous. You glance away to keep your composure and the spoon stops moving until you look back._"
          - id: hidden_satchel
            name: "tucked-away satchel"
            visibility: secret
            revealed_by: stew_pot
            investigate_label: "Reach behind the pot"
            noise: 2
            content:
              - {type: gold, amount: [10, 16], chance: 1.0}
              - {type: lore_fragment, fragment_id: 5, chance: 1.0}
            flavor_success: "_Behind the pot, propped against the wall, a child's satchel. The strap is too short for any goblin to wear. Inside: a folded drawing._"

      - id: rest_lift
        weight: 80
        description_pool:
          - "An old miner's lift platform, gear and counterweight rusted in place. A bench, a wineskin (one bite taken), a moment of quiet."
        features:
          - id: forgotten_wineskin
            name: "forgotten wineskin"
            visibility: visible
            investigate_label: "Take the wineskin"
            noise: 1
            content:
              - {type: item, item_id: health_potion, chance: 1.0}
            flavor_success: "_The wineskin is cool against your hand. The miner who left it never came back to finish it. You finish it._"

  # =========================================================================
  - floor: 2
    theme: the_flooded_tunnels
    background: |
      The flooded section. The mine cut a vein into a water-table here
      and never recovered. Goblins skirt the edges; the deeper places
      are leech-haunted; somewhere down a side passage, somebody else
      is still digging.

    layout:
      rooms_per_run: [6, 7]
      branches: [1, 2]
      branch_length: [1, 2]

    anchors:
      - {position: entrance, room_id: water_seam}
      - {position: boss, room_id: troll_door}

    wandering_threshold: 6
    wandering_pool:
      - {monster_id: goblin_archer, weight: 80}
      - {monster_id: cave_leech, weight: 100}
      - {monster_id: wolf, weight: 60}
      - {monster_id: goblin_shaman, weight: 50}

    monsters:
      - id: goblin_archer
        name: Goblin Archer
        description: "A goblin perched on a ledge, bow drawn."
        hp: 10
        defense: 0
        attack_dice: "1d6"
        attack_bonus: 1
        xp: 12
        gold: [4, 10]
        ai: {attack: 70, heavy: 20, defend: 10}
        loot:
          - {item_id: worm, chance: 22, type: cross_game_bait}
          - {item_id: insect, chance: 12, type: cross_game_bait}
          - {item_id: Singing Quartz, chance: 6, type: cross_game_ingredient, name: Singing Quartz}

      - id: goblin_shaman
        name: Goblin Shaman
        description: "A hunched goblin muttering curses, eyes glowing faintly."
        hp: 14
        defense: 1
        attack_dice: "1d6"
        attack_bonus: 2
        xp: 18
        gold: [6, 14]
        ai: {attack: 50, heavy: 30, defend: 20}
        loot:
          - {item_id: health_potion, chance: 20}
          - {item_id: insect, chance: 15, type: cross_game_bait}
          - {item_id: Ghostlight Oil, chance: 7, type: cross_game_ingredient, name: Ghostlight Oil}
          - {item_id: Voidbloom, chance: 6, type: cross_game_ingredient, name: Voidbloom}

      - id: cave_leech
        name: Cave Leech
        description: "A bloated, slimy worm that drops from the ceiling."
        hp: 8
        defense: 0
        attack_dice: "1d6"
        attack_bonus: 0
        xp: 10
        gold: [2, 6]
        ai: {attack: 90, heavy: 10}
        loot:
          - {item_id: worm, chance: 30, type: cross_game_bait}

      - id: wolf
        name: Dire Wolf
        description: "A massive wolf with matted fur and bared fangs."
        hp: 18
        defense: 1
        attack_dice: "1d6"
        attack_bonus: 2
        xp: 15
        gold: [3, 8]
        ai: {attack: 60, heavy: 30, defend: 10}
        loot:
          - {item_id: worm, chance: 20, type: cross_game_bait}
          - {item_id: Ashenworm Silk, chance: 6, type: cross_game_ingredient, name: Ashenworm Silk}

    boss:
      id: troll_guardian
      name: Troll Guardian
      description: "A massive troll hunched in the doorway, knuckles dragging through the water."
      hp: 50
      defense: 3
      attack_dice: "1d8"
      attack_bonus: 3
      xp: 50
      gold: [25, 50]
      ai: {attack: 45, heavy: 35, defend: 20}
      loot:
        - {item_id: chain_shirt, chance: 100, type: gear}
        - {item_id: greater_health_potion, chance: 50}
        - {item_id: worm, chance: 35, type: cross_game_bait}
        - {item_id: insect, chance: 30, type: cross_game_bait}
        - {item_id: Singing Quartz, chance: 15, type: cross_game_ingredient, name: Singing Quartz}
        - {item_id: longsword_plus1, chance: 10, type: gear}
        - {item_id: chain_shirt_plus1, chance: 10, type: gear}

    room_pool:
      - id: water_seam
        weight: 100
        description_pool:
          - "The corridor opens onto a low room half-filled with cold meltwater. Stepping stones are arranged in something that might be a path. None of the stones are recent; some have hand-prints worn into them from many small hands."
        ambient_pool:
          - "Somewhere, a dripping noise that's almost — but not quite — keeping rhythm with your heartbeat."
        features:
          - id: stepping_stone
            name: "the worn stepping stones"
            visibility: visible
            investigate_label: "Examine the stones"
            noise: 1
            content:
              - {type: gold, amount: [5, 9], chance: 1.0}
              - {type: narrate, text: "_The worn handprints in the stones are the size of children's. The stones have been here longer than any goblin generation._"}

      - id: troll_door
        weight: 100
        description_pool:
          - "An immense iron door, set into a frame too large for any of the goblins. In front of it: a guardian, hunched, water dripping from its knuckles."

      - id: leech_grotto
        weight: 100
        description_pool:
          - "The ceiling here is uncomfortably close, and what at first looks like dripping condensation is, on second look, something different. Far too many somethings, hanging."
        features:
          - id: leech_pile
            name: "feeding pile beneath the leeches"
            visibility: visible
            investigate_label: "Pick through the pile"
            noise: 2
            content:
              - {type: gold, amount: [4, 8], chance: 1.0}
              - {type: lore_fragment, fragment_id: 7, chance: 1.0}
            flavor_success: "_The pile is mostly bones — small ones. Among them, a wooden pull-toy missing one wheel. A name carved into the handle. It is not the name of someone you know._"

      - id: drift_camp
        weight: 100
        description_pool:
          - "A goblin staging camp set on a wedge of dry stone above the meltwater. Bedrolls. A cooking-fire someone died very near to. A satchel of papers, gone soft from damp."
        features:
          - id: damp_satchel
            name: "damp satchel"
            visibility: visible
            investigate_label: "Pick through the satchel"
            noise: 2
            content:
              - {type: gold, amount: [4, 7], chance: 0.8}
              - {type: lore_fragment, fragment_id: 6, chance: 1.0}
            flavor_success: "_The satchel is full of pages the goblin shaman has been keeping. The handwriting is poor. The diagrams are very, very specific._"
          - id: under_bedroll
            name: "tucked-under bedroll"
            visibility: secret
            revealed_by: damp_satchel
            investigate_label: "Pull up the bedroll"
            noise: 2
            content:
              - {type: gold, amount: [10, 14], chance: 1.0}
              - {type: item, item_id: smoke_bomb, chance: 0.6}
            flavor_success: "_The bedroll is hiding a small pouch of coins, kept dry against the stone. The shaman's private hoard. Probably._"

      - id: child_path
        weight: 90
        description_pool:
          - "A side-passage worn smooth by passage too small to be goblin and too small to be adult. The passage doesn't quite go anywhere; it ends in a stop, and a single, careful row of pebbles arranged like a counting game."
        ambient_pool:
          - "A breath of warmer air than the rest of the floor — as if someone, recently, was breathing here."
        features:
          - id: pebble_row
            name: "pebble row"
            visibility: visible
            investigate_label: "Examine the pebbles"
            noise: 1
            content:
              - {type: narrate, text: "_The pebbles are arranged in pairs and singles, the way a child counts something they're not allowed to know they're counting. The total, you can't help noticing, comes out at twenty-two._"}
              - {type: gold, amount: [2, 5], chance: 0.6}
            flavor_success: "_Whoever counted these did so very recently. The dust hasn't settled in the gaps between them._"

      - id: deep_well
        weight: 100
        description_pool:
          - "A circular shaft, drilled deep, the bottom invisible. The walls of the shaft are old miner's work for the first ten feet. After that, the marks on the stone change, and the stone changes with them."
        ambient_pool:
          - "From very far below, a long slow exhale that is almost certainly a draft."
        features:
          - id: shaft_wall
            name: "shaft wall, deeper down"
            visibility: visible
            investigate_label: "Lean over the shaft"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 8, chance: 1.0}
              - {type: gold, amount: [6, 12], chance: 0.5}
            flavor_success: "_You take a rubbing of one of the older marks on the wall. It does not match any letter or rune you know — and yet, looked at sidelong, the sense of it is unmistakable._"
          - id: lift_chain
            name: "snapped lift-chain"
            visibility: concealed
            perception_dc: 12
            look_hint: "the end of a heavy chain, half-hidden in the shaft's lip"
            investigate_label: "Pull the chain"
            noise: 2
            content:
              - {type: gold, amount: [12, 18], chance: 1.0}
              - {type: item, item_id: greater_health_potion, chance: 0.4}
            flavor_success: "_The chain comes up with a small wooden cage on the end. The cage was used, briefly, to lower a single object very far down. The object is not in the cage now._"

      - id: glow_pool
        weight: 80
        description_pool:
          - "A pool of meltwater whose depths glow, very faintly, with something that is not algae. The surface of the pool ripples in ways that don't match the air."
        features:
          - id: glow_offerings
            name: "ring of small offerings around the pool"
            visibility: visible
            investigate_label: "Examine the offerings"
            noise: 1
            content:
              - {type: gold, amount: [6, 10], chance: 0.9}
              - {type: narrate, text: "_The offerings are small and precise: a thimble, a coin, a tooth. The pool, sometimes, accepts an offering and the ripple changes._"}

      - id: rest_seep
        weight: 70
        description_pool:
          - "A high, dry shelf above the floodwater. Someone — recently — has set up a candle and left a small tin of biscuits. A goblin's hand-drawn sign in front of it reads, with surprising care, **TRUCE**."
        features:
          - id: tin_biscuits
            name: "tin of biscuits"
            visibility: visible
            investigate_label: "Take the biscuits"
            noise: 1
            content:
              - {type: item, item_id: health_potion, chance: 1.0}
            flavor_success: "_The biscuits are the kind farmers' wives make. Either the goblins traded for them or somebody — recently — was a farmer's wife._"

  # =========================================================================
  - floor: 3
    theme: the_throne_room
    background: |
      The deepest level the goblins use. Above this, they're scavengers.
      Here, they're a court — ranks, ledgers, taxes. The king has a
      treaty with what waits below, and he has been keeping his end.

    layout:
      rooms_per_run: [6, 8]
      branches: [1, 2]
      branch_length: [1, 2]

    anchors:
      - {position: entrance, room_id: throne_passage}
      - {position: boss, room_id: throne_chamber}

    wandering_threshold: 5
    wandering_pool:
      - {monster_id: goblin_elite, weight: 100}
      - {monster_id: goblin_assassin, weight: 80}
      - {monster_id: ogre, weight: 50}

    monsters:
      - id: goblin_elite
        name: Goblin Elite
        description: "A well-armed goblin in actual armor. These ones are dangerous."
        hp: 20
        defense: 2
        attack_dice: "1d6"
        attack_bonus: 3
        xp: 20
        gold: [8, 16]
        ai: {attack: 50, heavy: 30, defend: 20}
        loot:
          - {item_id: health_potion, chance: 25}
          - {item_id: insect, chance: 15, type: cross_game_bait}
          - {item_id: shiny_lure, chance: 5, type: cross_game_bait}
          - {item_id: Flickerstone, chance: 7, type: cross_game_ingredient, name: Flickerstone}

      - id: ogre
        name: Ogre
        description: "Enormous and dim-witted, but each swing could be your last."
        hp: 30
        defense: 2
        attack_dice: "1d8"
        attack_bonus: 3
        xp: 25
        gold: [10, 20]
        ai: {attack: 60, heavy: 30, defend: 10}
        loot:
          - {item_id: worm, chance: 25, type: cross_game_bait}
          - {item_id: Tremor Grub, chance: 6, type: cross_game_ingredient, name: Tremor Grub}
          - {item_id: Echo Bone, chance: 5, type: cross_game_ingredient, name: Echo Bone}

      - id: goblin_assassin
        name: Goblin Assassin
        description: "You barely see the glint of the blade before it strikes."
        hp: 14
        defense: 1
        attack_dice: "1d8"
        attack_bonus: 2
        xp: 22
        gold: [8, 18]
        ai: {attack: 55, heavy: 35, defend: 10}
        loot:
          - {item_id: smoke_bomb, chance: 15}
          - {item_id: insect, chance: 15, type: cross_game_bait}
          - {item_id: shiny_lure, chance: 8, type: cross_game_bait}
          - {item_id: Nullite Powder, chance: 6, type: cross_game_ingredient, name: Nullite Powder}

    boss:
      id: goblin_king
      name: The Goblin King
      description: "Draped in stolen finery and wielding a wicked crown-shaped mace. He will not share his hoard."
      hp: 70
      defense: 4
      attack_dice: "1d10"
      attack_bonus: 4
      xp: 80
      gold: [50, 100]
      ai: {attack: 40, heavy: 35, defend: 25}
      loot:
        - {item_id: greataxe, chance: 100, type: gear}
        - {item_id: greater_health_potion, chance: 100}
        - {item_id: insect, chance: 40, type: cross_game_bait}
        - {item_id: shiny_lure, chance: 20, type: cross_game_bait}
        - {item_id: Scorchcap Spore, chance: 18, type: cross_game_ingredient, name: Scorchcap Spore}
        - {item_id: "Wyrm's Tear", chance: 13, type: cross_game_ingredient, name: "Wyrm's Tear"}
        - {item_id: battle_axe_plus1, chance: 12, type: gear}
        - {item_id: scale_mail_plus1, chance: 12, type: gear}
        - {item_id: longsword_plus2, chance: 4, type: gear}
        - {item_id: scale_mail_plus2, chance: 4, type: gear}

    room_pool:
      - id: throne_passage
        weight: 100
        description_pool:
          - "The corridor widens into a hall. Goblin sentries stood here once; their stations are still warm. The deeper you go, the better-made the stone. The miners did not cut these walls."
        ambient_pool:
          - "Drumming, very far ahead. Slow, patient, ceremonial."
        features:
          - id: empty_sentry_post
            name: "abandoned sentry post"
            visibility: visible
            investigate_label: "Search the post"
            noise: 1
            content:
              - {type: gold, amount: [6, 10], chance: 1.0}
              - {type: item, item_id: health_potion, chance: 0.3}
            flavor_success: "_The sentry left in a hurry. Their bowl of stew is still slightly warm; their dice are still in mid-roll on the bench._"

      - id: throne_chamber
        weight: 100
        description_pool:
          - "The throne room. Stolen tapestries. Stolen lanterns. A throne of stolen things. A king on it, in stolen finery, who will absolutely not share."

      - id: tribute_pile
        weight: 100
        description_pool:
          - "A side-room piled to the ceiling with stolen goods. Bolts of cloth. A village's worth of pots. A bell. An infant's quilt, very small, set aside on its own."
        features:
          - id: stolen_ledger
            name: "stolen ledger atop the pile"
            visibility: visible
            investigate_label: "Read the ledger"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 9, chance: 1.0}
              - {type: gold, amount: [10, 16], chance: 0.7}
            flavor_success: "_A village ledger, repurposed. The original entries have been struck through; goblin charcoal entries fill the columns now. A list of what has been taken, where it came from, where it was sent._"

      - id: assassin_alcove
        weight: 100
        description_pool:
          - "A narrow alcove off the main corridor, lined with hooks. Most of the hooks hold weapons. Some hold things that aren't weapons but are clearly meant to be used as if they were."
        ambient_pool:
          - "The hooks are ranked by goblin name. The best-stocked rank is unlabeled."
        features:
          - id: hooked_weapons
            name: "hooked weapons"
            visibility: visible
            investigate_label: "Take a weapon"
            noise: 1
            content:
              - {type: gold, amount: [5, 9], chance: 0.8}
              - {type: item, item_id: smoke_bomb, chance: 0.5}
            flavor_success: "_You take what's offered. The hooks are arranged so the next goblin to come through will not notice anything missing. Probably._"
          - id: hidden_panel
            name: "hidden panel behind the rack"
            visibility: secret
            revealed_by: hooked_weapons
            investigate_label: "Pry up the panel"
            noise: 2
            content:
              - {type: gold, amount: [14, 22], chance: 1.0}
              - {type: item, item_id: greater_health_potion, chance: 0.5}
            flavor_success: "_The panel comes up cleanly — it's been pried up before. Whoever knew about it was not the king._"

      - id: captive_pen
        weight: 100
        description_pool:
          - "A pen built from stolen lumber, the bars too widely spaced for goblins. Three of the four pens are empty. The fourth has a name carved into the inside of one post."
        ambient_pool:
          - "From the empty pens: nothing now. Recently: not nothing."
        features:
          - id: carved_post
            name: "carved post"
            visibility: visible
            investigate_label: "Read the carving"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 10, chance: 1.0}
              - {type: gold, amount: [4, 8], chance: 0.5}
            flavor_success: "_The carving is recent and the chisel was a bone. The name and message are clear, and the chewed grain above the carving is, you suspect, what came after._"

      - id: war_drums
        weight: 90
        description_pool:
          - "A round chamber full of standing drums, ranked in a circle around a central fire pit. The fire is out. The drums are still warm."
        features:
          - id: silent_drum
            name: "still-warm drum"
            visibility: visible
            investigate_label: "Lean against a drum"
            noise: 1
            content:
              - {type: gold, amount: [3, 6], chance: 0.8}
              - {type: narrate, text: "_The drumhead is taut and the wood beneath it is warm. They were sounding it not long before you came in. Whatever they signaled, it was answered._"}

      - id: treaty_room
        weight: 100
        description_pool:
          - "A small private chamber off the throne, intended for negotiations. There is a single table. On the table, a single piece of paper, weighted with a stone."
        ambient_pool:
          - "The room is cold. The stone weighting the paper is warm."
        features:
          - id: weighted_paper
            name: "weighted paper"
            visibility: visible
            investigate_label: "Read the paper"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 11, chance: 1.0}
              - {type: gold, amount: [8, 14], chance: 0.7}
            flavor_success: "_The paper is the king's treaty with what waits below. The other party's mark is a thumbprint that was never goblin-sized — and the seal on the back of the paper, you can't help noticing, is broken._"

      - id: rest_torchwell
        weight: 70
        description_pool:
          - "A small alcove with a stone bench and a torch that does not gutter. Whoever stops here is, by the king's order, not to be disturbed. The order has been honored — for now."
        features:
          - id: untroubled_bench
            name: "the bench"
            visibility: visible
            investigate_label: "Rest a moment"
            noise: 1
            content:
              - {type: item, item_id: greater_health_potion, chance: 0.7}
              - {type: gold, amount: [5, 9], chance: 0.5}
            flavor_success: "_The bench is, surprisingly, comfortable. Whoever last rested here left a sealed flask behind. It still seals. You take it._"

      - id: under_throne
        weight: 80
        description_pool:
          - "A narrow crawl-space under the throne itself, stoppered with a stone the king clearly does not know is loose. The miners cut this; the king does not know they did."
        features:
          - id: stoppered_stone
            name: "loose stone in the floor"
            visibility: concealed
            perception_dc: 13
            look_hint: "a flagstone whose mortar has been picked away, very carefully, by something with patience"
            investigate_label: "Lift the stone"
            noise: 3
            content:
              - {type: gold, amount: [18, 28], chance: 1.0}
              - {type: lore_fragment, fragment_id: 12, chance: 1.0}
            flavor_success: "_The stone lifts cleanly. Below: a small iron-and-tin crown waiting in a hollow, and tucked beside it, the miner's last journal entry — the page that should have ended his sentence._"
