# =============================================================================
# THE UNDERCRYPT — v2 (RPG-lite overhaul)
# =============================================================================
# Sibling of the_undercrypt.yaml. Admin-gated until cutover (PR 8). Reuses
# every v1 monster and boss verbatim and layers the v2 room-pool / features
# / lore_fragments / legendary_reward schema on top.
#
# Floors:
#   1 — The Crumbling Tombs   (Crypt Warden)
#   2 — The Flooded Ossuary   (Wraith Lord)
#   3 — The Sanctum           (Varenthos the Undying — the cult's last king)
#
# Lore: 12 fragments tracing the truth of the cathedral above — built on
# ground its priests called sanctified, but wasn't, and the king who has
# been waiting underneath for someone to find him. Collecting all 12 unlocks
# The Phylactery Shard.
# =============================================================================

id: the_undercrypt
name: "The Undercrypt"
description: "A forgotten burial complex beneath the old cathedral. The dead do not rest easily here."

background:
  tone: "Gothic horror, funereal quiet. Restraint over jump-scare. The dead are patient."
  pitch: "Beneath the old cathedral, a burial complex the clergy stopped consecrating generations ago. Something is still in charge down there."
  lore: |
    The cathedral above was built three hundred years ago on ground the
    priests assured everyone was already sanctified. It was a lie. The
    cathedral's foundations are the roof of something older — a burial
    complex begun by a cult the clergy later drove from the city but
    never properly destroyed. The tombs went deeper than the clergy knew.
    The cult's last king is still down there, holding court.

    The dead do not rest easily in the Undercrypt. They wait for
    something. They wait, perhaps, for you.
  dm_hooks:
    - "Tomb markers in a language that predates the cathedral by a millennium"
    - "Candles that relight themselves after you walk past"
    - "Flagstones warm where no heat source explains it"
    - "A faint whisper of prayer in a tongue the priests never taught"
    - "The cathedral's own holy symbols, defaced — by themselves, slowly, over time"
  style_notes: |
    Quiet menace. Undead are not slobbering zombies here — they are
    formal, ritualistic, still observing protocols from a faith that
    forgot itself. Avoid slapstick. Lean into patience and dread.

# ---------------------------------------------------------------------------
# Lore fragments — the cathedral's lie, the cult's faith, the king's offer.
# ---------------------------------------------------------------------------

lore_fragments:
  - id: 1
    text: |
      _Founding records, copied in a clerk's careful hand._

      To his Excellency, on the matter of the cathedral's site: the
      ground has been surveyed and prayed over thrice. The previous
      occupants are dispersed; their works are razed to the bedrock.
      The site is suitable. Construction may proceed.

      _— Brother Adric, Site Warden, in the Year of Light 412._

  - id: 2
    text: |
      _Marginalia in a different hand, on a different copy of the same
      record. Found years later._

      The site is not suitable. We have built the cathedral on a roof,
      not on bedrock. May whoever finds this know what we knew: the
      ground was not sanctified. We were instructed to call it so.

      _— A. (the same Adric, much older.)_

  - id: 3
    text: |
      _A young priest's diary, leather-bound. The hand starts neat and
      grows uneven._

      Brother Cassian heard the singing again last night. He says it
      comes through the stone of the chapel floor. The Father confessor
      has told him to abstain from wine and pray more. Cassian had not
      taken wine in three months.

      He says the words of the song are not from any tongue we are
      taught. He says he understood them anyway.

  - id: 4
    text: |
      _An expedition's notes, in a clergy hand. Salt has eaten half
      the page._

      ...descended forty cubits below the lower vestry. We expected
      the cathedral's foundation here. We found instead a sealed
      doorway, of older make, whose lintel was carved with a sigil our
      cathedral does not teach. The party has been instructed to
      remember nothing of what they saw. I cannot follow that
      instruction.

  - id: 5
    text: |
      _Translation notes, kept in a locked drawer of the cathedral
      library._

      The cult's central tenet, as best we can render it from the
      tongue they used: **patience is a holy act.** They believed the
      world was always being slowly eaten by something larger, and
      that the proper response was not to resist but to wait — wait
      so well that the eater eventually noticed the waiting and
      returned the favor.

      We did not understand at the time what they were waiting for.

  - id: 6
    text: |
      _A bishop's confession, sealed and never sent._

      I have given the order to brick over the lower stair. We could
      not find the bottom; we could not break what was below. We have
      pretended that the Light fills the space. It does not. May my
      successor be forgiven for the quiet I am about to inherit them.

  - id: 7
    text: |
      _A confession, taken under duress, from a captive cultist.
      Recorded by a clergy interrogator whose hand grows steadier as
      the prisoner's grows weaker._

      He says — when pressed — that they did not wait for a god.
      They waited for a king.

      He says — when pressed harder — that the king is already there.
      Has been there since before the first stone of the cathedral.
      Will be there after the last.

      He says — when no longer pressed — that the king is patient and
      it is what makes him beautiful.

  - id: 8
    text: |
      _A diagram, drawn from memory by a clergy surveyor who descended
      and returned. The lines are not steady._

      A rough cross-section. The cathedral above is small, very small,
      a hat. Below the cathedral, a wider chamber, then a wider still,
      then a chamber that is not a chamber but a hall. The hall has
      no shown bottom. The pencil, at the deepest mark, has been
      pressed hard enough to nearly tear through the page.

  - id: 9
    text: |
      _A page from a book that should not be in any library. The
      handwriting is regular and old and terribly calm._

      "I have been here. I will be here. The cathedral is a courtesy.
      I have allowed them their cathedral because their god, while
      young, is not the worst neighbor I have known. When their god
      is no longer young, I will reconsider. When their god is no
      longer young."

      _— there is no signature, only a careful, patient line at the
      bottom of the page._

  - id: 10
    text: |
      _Final entry in the cathedral's "Failures Log," a private
      ledger of things the priests gave up on._

      Item: The Lower Stair. _Outcome:_ Sealed. _Result:_ Acceptable.
      _Standing Order:_ Remember nothing. Speak nothing. The Light
      will hold what we cannot.

      _Note added later, in Adric's hand:_ The Light has not been
      holding it. It has been very politely asking.

  - id: 11
    text: |
      _Two notes by the same priest, separated by years, on the same
      slip of paper._

      _First note (younger hand):_ I have set the final seal.
      Sanctified by my own hand. May it hold for a thousand years.

      _Second note (older hand, beneath):_ It is holding because the
      one beneath is allowing it to. He likes the cathedral. He says
      he likes the music on Sundays. I have not told anyone that he
      and I have spoken. I am old enough now that I will be the last
      to know.

  - id: 12
    text: |
      _Final fragment. A page left on the lectern of the Sanctum, in
      handwriting that has no business being so calm, addressed to
      whoever finds it._

      I do not eat your kind. I do not require your worship. I have
      asked for very little for a very long time.

      I require a successor. The cathedral is acceptable as a place;
      the priests are acceptable as company; the world is acceptable
      as a stage. I have been the proprietor for long enough.

      Take the shard. Take the long quiet with it. It is enough; it
      will be enough.

      _— V., the proprietor, by his own hand._

# ---------------------------------------------------------------------------
# Legendary reward — granted once all 12 fragments are collected.
# ---------------------------------------------------------------------------

legendary_reward:
  item_id: ring_of_precision
  name: "The Phylactery Shard"
  flavor: |
    _The book is complete. On the lectern of the Sanctum, where the
    last fragment lay, a small dark shard rests on a square of folded
    velvet. It is warm. It is heavier than its size._

    _Closing your hand around it does not feel like accepting a gift.
    It feels like signing a contract you have already, somehow, read._

    _**The Phylactery Shard** is yours. Its long quiet comes with it._

# ---------------------------------------------------------------------------
# FLOORS
# ---------------------------------------------------------------------------

floors:
  # =========================================================================
  - floor: 1
    theme: the_crumbling_tombs
    background: |
      The upper tombs — once consecrated, now merely watched. The
      cathedral's quiet carries down here; the dead remember being
      buried in dignity and have been waiting, patiently, for that
      dignity to return.

    layout:
      rooms_per_run: [5, 6]
      branches: [1, 2]
      branch_length: [1, 1]

    anchors:
      - {position: entrance, room_id: cathedral_descent}
      - {position: boss, room_id: warden_door}

    wandering_threshold: 6
    wandering_pool:
      - {monster_id: shambling_corpse, weight: 100}
      - {monster_id: bone_rat, weight: 80}
      - {monster_id: restless_skeleton, weight: 60}

    monsters:
      - id: shambling_corpse
        name: Shambling Corpse
        description: "A half-rotted body dragging itself forward, jaw slack and eyes hollow."
        hp: 10
        defense: 0
        attack_dice: "1d4"
        attack_bonus: 0
        xp: 6
        gold: [1, 5]
        ai: {attack: 80, heavy: 20}
        loot:
          - {item_id: worm, chance: 25, type: cross_game_bait}

      - id: bone_rat
        name: Bone Rat
        description: "A skeletal rat held together by spite and dark magic."
        hp: 5
        defense: 0
        attack_dice: "1d4"
        attack_bonus: -1
        xp: 4
        gold: [1, 3]
        ai: {attack: 90, heavy: 10}
        loot:
          - {item_id: worm, chance: 30, type: cross_game_bait}
          - {item_id: Echo Bone, chance: 7, type: cross_game_ingredient, name: Echo Bone}

      - id: restless_skeleton
        name: Restless Skeleton
        description: "Bones clatter as it raises a rusted sword. It has no eyes, but it sees you."
        hp: 14
        defense: 1
        attack_dice: "1d4"
        attack_bonus: 1
        xp: 10
        gold: [3, 8]
        ai: {attack: 60, heavy: 20, defend: 20}
        loot:
          - {item_id: health_potion, chance: 15}
          - {item_id: worm, chance: 20, type: cross_game_bait}

    boss:
      id: crypt_warden
      name: Crypt Warden
      description: "An armored skeleton standing vigil before a sealed iron door, its eyes burning with pale fire."
      hp: 32
      defense: 2
      attack_dice: "1d6"
      attack_bonus: 2
      xp: 30
      gold: [15, 30]
      ai: {attack: 45, heavy: 25, defend: 30}
      loot:
        - {item_id: health_potion, chance: 100}
        - {item_id: worm, chance: 30, type: cross_game_bait}
        - {item_id: insect, chance: 20, type: cross_game_bait}
        - {item_id: Ghostlight Oil, chance: 15, type: cross_game_ingredient, name: Ghostlight Oil}
        - {item_id: handaxe_plus1, chance: 8, type: gear}
        - {item_id: leather_armor_plus1, chance: 8, type: gear}

    room_pool:
      - id: cathedral_descent
        weight: 100
        description_pool:
          - "A spiral stair of cathedral-grey stone, descending too far for the building above. Halfway down, the stone becomes older, cleaner, and quieter."
        ambient_pool:
          - "The hymn from above has not stopped. It is also not, you notice, audible from down here. Both things are true."
        features:
          - id: founders_plaque
            name: "founder's plaque"
            visibility: visible
            investigate_label: "Read the plaque"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 1, chance: 1.0}
              - {type: gold, amount: [3, 6], chance: 0.5}
            flavor_success: "_The plaque is brass and it is worn. Brother Adric's words are still readable. They were copied many times by clerks who, you suspect, did not know what they were copying._"
          - id: scratched_plaque
            name: "back of the plaque"
            visibility: secret
            revealed_by: founders_plaque
            investigate_label: "Look behind the plaque"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 2, chance: 1.0}
            flavor_success: "_Lifting the plaque off its hooks reveals the wall behind it — and an inscription scratched directly into the stone, in the same hand as Adric's signature, but very much later in his life._"

      - id: warden_door
        weight: 100
        description_pool:
          - "A sealed iron door, twice your height. A figure in old armor stands before it with the patience of something that does not need to breathe."

      - id: candle_recess
        weight: 100
        description_pool:
          - "A wall recess holding a row of candles, half-melted. Three are out. Three are still alight. The lit ones are not the ones you'd expect to be lit, given how much wax they have."
        ambient_pool:
          - "When you look away from a particular candle, it relights itself. When you look back, it is alight."
        features:
          - id: candle_alms
            name: "alms-bowl beneath the candles"
            visibility: visible
            investigate_label: "Take from the bowl"
            noise: 1
            content:
              - {type: gold, amount: [4, 9], chance: 1.0}
              - {type: narrate, text: "_The coins are old, the cathedral's mint, and have not been counted in a very long time. You feel as if you have been seen taking them. You feel, oddly, as if that is permitted._"}
            flavor_success: "_The bowl is brass, polished by use, and the offerings have stopped accumulating recently. As if the worshippers ran out and the bowl knows this._"

      - id: tomb_aisle
        weight: 100
        description_pool:
          - "A long aisle of tomb markers in two languages — one cathedral Latin, one older. The older language is identical from marker to marker; the Latin is varied. Whoever was buried here had different names but the same epitaph."
        features:
          - id: older_marker
            name: "an older tomb marker"
            visibility: visible
            investigate_label: "Read the older marker"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 3, chance: 1.0}
              - {type: gold, amount: [3, 7], chance: 0.4}
            flavor_success: "_The marker's older inscription is in a tongue no priest knows. Beside it, a young priest's diary has been left, very deliberately, for someone to find. You read the diary._"
          - id: loose_marker
            name: "loose tomb marker"
            visibility: concealed
            perception_dc: 12
            look_hint: "a marker that does not sit quite flush against its base"
            investigate_label: "Lift the marker"
            noise: 2
            content:
              - {type: gold, amount: [10, 16], chance: 1.0}
              - {type: item, item_id: health_potion, chance: 0.6}
            flavor_success: "_The marker tips up cleanly. Beneath it, in a hollow worn smooth by previous lifters, a small cache of grave-goods nobody has come back to claim._"

      - id: broken_sarcophagus
        weight: 100
        description_pool:
          - "A sarcophagus whose lid has been laid carefully aside — not toppled, laid. The corpse inside is no longer present. The grave-goods are."
        ambient_pool:
          - "The flagstones around the sarcophagus are warm to bare-foot pressure. There is no heat source."
        features:
          - id: grave_goods
            name: "the remaining grave-goods"
            visibility: visible
            investigate_label: "Inspect the grave-goods"
            noise: 1
            content:
              - {type: gold, amount: [8, 14], chance: 1.0}
              - {type: item, item_id: health_potion, chance: 0.5}
              - {type: narrate, text: "_The corpse's possessions: a coin, a small carved bone, and a folded scrap of cloth. The corpse, you feel, removed itself politely._"}
            flavor_success: "_You take what's offered. The lid being placed carefully aside, you suspect, was a courtesy to whoever came next. It was a courtesy to you._"

      - id: vestry_remnant
        weight: 100
        description_pool:
          - "What was once a vestry off the cathedral's lower transept. The robes have moldered. The shelves still hold records — copies, mostly, that the priests didn't bother to take with them."
        features:
          - id: copy_records
            name: "shelf of copy-records"
            visibility: visible
            investigate_label: "Pull a record"
            noise: 2
            content:
              - {type: gold, amount: [5, 9], chance: 0.7}
              - {type: lore_fragment, fragment_id: 4, chance: 1.0}
            flavor_success: "_The records are clergy paperwork — the boring kind that someone, once, carefully archived. Among them: a salt-eaten expedition note that should have been destroyed and was not._"

      - id: prayer_alcove
        weight: 90
        description_pool:
          - "A small kneeling-alcove. The cushion has rotted but the kneeler-stone is worn smooth by countless knees. Only the shape of the wear is wrong. The kneeling priest must have been positioned facing slightly off-center."
        ambient_pool:
          - "The shape suggests the prayer was not toward the cathedral above, but toward somewhere below."
        features:
          - id: kneeler_stone
            name: "the kneeler stone"
            visibility: visible
            investigate_label: "Examine the wear pattern"
            noise: 1
            content:
              - {type: narrate, text: "_The wear traces a kneeler's posture, but rotated three or four degrees off true. Whoever knelt here knelt very consistently, and not, you realize, in the direction the cathedral approves._"}
              - {type: gold, amount: [3, 6], chance: 0.5}

      - id: rest_chapel
        weight: 70
        description_pool:
          - "A small side-chapel, untended for decades. A bench, a melted-down candlestand, a single icon whose face has been very gently — almost lovingly — sanded blank."
        features:
          - id: tended_bench
            name: "the bench"
            visibility: visible
            investigate_label: "Sit on the bench"
            noise: 1
            content:
              - {type: item, item_id: health_potion, chance: 1.0}
            flavor_success: "_The bench is dust-clean — not maintained, exactly, but cleaner than it should be. A flask of consecrated water sits beneath it. You drink. Your shoulders lower without your permission._"

  # =========================================================================
  - floor: 2
    theme: the_flooded_ossuary
    background: |
      Below the upper tombs, the ossuary — where the cathedral's
      excavations stopped because the cathedral's excavators stopped
      coming back. Standing meltwater. Bones in piles that are not
      always the bones of the buried.

    layout:
      rooms_per_run: [6, 7]
      branches: [1, 2]
      branch_length: [1, 2]

    anchors:
      - {position: entrance, room_id: water_steps}
      - {position: boss, room_id: wraith_gate}

    wandering_threshold: 6
    wandering_pool:
      - {monster_id: drowned_revenant, weight: 80}
      - {monster_id: phantom, weight: 70}
      - {monster_id: skeletal_archer, weight: 80}
      - {monster_id: bone_horror, weight: 60}

    monsters:
      - id: drowned_revenant
        name: Drowned Revenant
        description: "Waterlogged and bloated, it lurches from the flooded passage with a gurgling moan."
        hp: 16
        defense: 1
        attack_dice: "1d6"
        attack_bonus: 1
        xp: 14
        gold: [5, 12]
        ai: {attack: 70, heavy: 20, defend: 10}
        loot:
          - {item_id: worm, chance: 22, type: cross_game_bait}
          - {item_id: insect, chance: 10, type: cross_game_bait}
          - {item_id: Duskfen Mud, chance: 7, type: cross_game_ingredient, name: Duskfen Mud}

      - id: phantom
        name: Phantom
        description: "A translucent figure drifts through the wall, its face frozen in a silent scream."
        hp: 12
        defense: 2
        attack_dice: "1d6"
        attack_bonus: 2
        xp: 18
        gold: [4, 10]
        ai: {attack: 55, heavy: 35, defend: 10}
        loot:
          - {item_id: insect, chance: 12, type: cross_game_bait}
          - {item_id: Ghostlight Oil, chance: 11, type: cross_game_ingredient, name: Ghostlight Oil}
          - {item_id: Voidbloom, chance: 6, type: cross_game_ingredient, name: Voidbloom}

      - id: skeletal_archer
        name: Skeletal Archer
        description: "Perched atop a pile of bones, it nocks an arrow with mechanical precision."
        hp: 10
        defense: 0
        attack_dice: "1d6"
        attack_bonus: 2
        xp: 12
        gold: [4, 10]
        ai: {attack: 65, heavy: 25, defend: 10}
        loot:
          - {item_id: worm, chance: 20, type: cross_game_bait}
          - {item_id: insect, chance: 12, type: cross_game_bait}
          - {item_id: Echo Bone, chance: 11, type: cross_game_ingredient, name: Echo Bone}
          - {item_id: Nullite Powder, chance: 6, type: cross_game_ingredient, name: Nullite Powder}

      - id: bone_horror
        name: Bone Horror
        description: "A towering mass of fused skeletons, dozens of arms clawing in every direction."
        hp: 22
        defense: 1
        attack_dice: "1d6"
        attack_bonus: 2
        xp: 16
        gold: [6, 14]
        ai: {attack: 60, heavy: 30, defend: 10}
        loot:
          - {item_id: health_potion, chance: 20}
          - {item_id: worm, chance: 20, type: cross_game_bait}
          - {item_id: Singing Quartz, chance: 7, type: cross_game_ingredient, name: Singing Quartz}

    boss:
      id: wraith_lord
      name: Wraith Lord
      description: "A towering specter draped in tattered robes, its hollow crown flickering with ghostfire."
      hp: 52
      defense: 3
      attack_dice: "1d8"
      attack_bonus: 3
      xp: 50
      gold: [25, 50]
      ai: {attack: 40, heavy: 35, defend: 25}
      loot:
        - {item_id: greater_health_potion, chance: 50}
        - {item_id: chain_shirt, chance: 100, type: gear}
        - {item_id: insect, chance: 30, type: cross_game_bait}
        - {item_id: shiny_lure, chance: 10, type: cross_game_bait}
        - {item_id: Ghostlight Oil, chance: 23, type: cross_game_ingredient, name: Ghostlight Oil}
        - {item_id: Voidbloom, chance: 15, type: cross_game_ingredient, name: Voidbloom}
        - {item_id: "Hollow King's Sigh", chance: 11, type: cross_game_ingredient, name: "Hollow King's Sigh"}
        - {item_id: longsword_plus1, chance: 10, type: gear}
        - {item_id: chain_shirt_plus1, chance: 10, type: gear}

    room_pool:
      - id: water_steps
        weight: 100
        description_pool:
          - "The stair continues, downward, into water. The water is ankle-deep, then knee-deep, then quietly waist-deep on the far landing. It is, against expectation, warm."
        ambient_pool:
          - "Something is floating in the water that is, on second look, not floating but standing very still beneath the surface."
        features:
          - id: warm_water_seal
            name: "submerged seal in the water"
            visibility: visible
            investigate_label: "Reach for the seal"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 6, chance: 1.0}
              - {type: gold, amount: [4, 9], chance: 0.6}
            flavor_success: "_Your fingers find a wax-sealed scroll case wedged in a recess of the wall, kept dry by very old craft. Inside: a bishop's confession, sealed and never sent._"

      - id: wraith_gate
        weight: 100
        description_pool:
          - "An archway of bone and broken finery. Beyond it, a chamber where a ghostly figure in a crown hovers, having waited a very long time for someone to come."

      - id: bone_drift
        weight: 100
        description_pool:
          - "A long room where bones have collected against one wall like driftwood. The arrangement is too neat to be accidental and too organic to be deliberate."
        features:
          - id: drifted_bones
            name: "the drift of bones"
            visibility: visible
            investigate_label: "Pick through the drift"
            noise: 2
            content:
              - {type: gold, amount: [5, 9], chance: 0.8}
              - {type: item, item_id: health_potion, chance: 0.4}
            flavor_success: "_Among the bones: a few coins, a small intact phial of water that may once have been holy, and the unmistakable shape of a kneeler's calluses on a femur. The dead were burying the dead._"
          - id: scrapbook_in_bones
            name: "scrapbook tucked into the drift"
            visibility: secret
            revealed_by: drifted_bones
            investigate_label: "Open the scrapbook"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 5, chance: 1.0}
            flavor_success: "_The scrapbook is the cathedral library's. Translation notes in a careful clergy hand. Locked behind several pages, kept here because nowhere upstairs could be trusted._"

      - id: soul_chain_chamber
        weight: 100
        description_pool:
          - "A chamber whose walls are studded with iron rings, from which translucent chains drift upward into the dark. The chains do not, you notice, lead anywhere; they end in mid-air."
        ambient_pool:
          - "When you don't look at them, the chains tighten by very small amounts. When you look back, they are slack."
        features:
          - id: ring_alcove
            name: "alcove behind a wall ring"
            visibility: visible
            investigate_label: "Reach into the alcove"
            noise: 2
            content:
              - {type: gold, amount: [8, 14], chance: 1.0}
              - {type: narrate, text: "_The alcove was, once, where a prisoner kept their personal effects. The prisoner is no longer using them. Whoever set this up wanted the next visitor to take them, and not feel bad._"}
            flavor_success: "_The alcove is dry. The contents are dry. Whatever is keeping it dry is older than the cathedral's plumbing._"

      - id: drowning_choir
        weight: 100
        description_pool:
          - "A chamber half-flooded, where a dozen waterlogged figures stand in choir formation. They are, and have been for some time, holding the same note. You cannot quite hear it; you can feel it."
        features:
          - id: choirmasters_lectern
            name: "the choirmaster's lectern"
            visibility: visible
            investigate_label: "Examine the lectern"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 8, chance: 1.0}
              - {type: gold, amount: [6, 11], chance: 0.7}
            flavor_success: "_The lectern holds a single page, kept dry. A diagram of the burial complex's true depth, drawn from memory by someone who returned only just enough._"

      - id: archivist_cell
        weight: 100
        description_pool:
          - "A small monk's cell — the kind a clergy archivist would use to copy texts. The desk is set up. The chair is pushed back, recently. The work is half done."
        features:
          - id: half_finished_copy
            name: "half-finished copy on the desk"
            visibility: visible
            investigate_label: "Read the copy"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 7, chance: 1.0}
              - {type: gold, amount: [4, 8], chance: 0.5}
            flavor_success: "_The copy is a transcript of an interrogation. The clergy interrogator's handwriting steadies as the prisoner's voice steadies. Whoever was doing the copying stopped abruptly and went elsewhere — recently._"

      - id: hollow_well
        weight: 90
        description_pool:
          - "A circular well with no cover and no bottom. The clergy's seal has been broken — not violently, not recently, but at some point in the last several decades. The break was very neat."
        ambient_pool:
          - "The well exhales, very slowly. The exhale carries the smell of warm stone."
        features:
          - id: well_lip
            name: "the well's lip"
            visibility: visible
            investigate_label: "Lean over the well"
            noise: 2
            content:
              - {type: gold, amount: [10, 16], chance: 0.8}
              - {type: narrate, text: "_The lip is carved with a Latin warning that has been gently sanded away — half-erased, on the side facing down. The other half is intact._"}
            flavor_success: "_You take a coin offering from the lip. The well receives a coin from below in exchange, much later. You hear it land somewhere very far away._"

      - id: rest_kneel
        weight: 70
        description_pool:
          - "A dry recess off the main flooded passage. A kneeler. A candlestand, lit. A small loaf of bread that was, by the look of the crust, baked yesterday."
        features:
          - id: fresh_bread
            name: "the loaf"
            visibility: visible
            investigate_label: "Take the loaf"
            noise: 1
            content:
              - {type: item, item_id: greater_health_potion, chance: 1.0}
            flavor_success: "_Whoever set out this loaf, set it out for a stranger. You eat. The bread is good; the cathedral above is, against expectation, still capable of kindness._"

  # =========================================================================
  - floor: 3
    theme: the_sanctum
    background: |
      The cult's sanctum, sealed behind one final door the cathedral
      could not break. The dead here are formal. They are not waiting
      for the cathedral to remember them — they are waiting for the
      proprietor, who is patient, and who is here.

    layout:
      rooms_per_run: [6, 8]
      branches: [1, 3]
      branch_length: [1, 2]

    anchors:
      - {position: entrance, room_id: sanctum_threshold}
      - {position: boss, room_id: phylactery_chamber}

    wandering_threshold: 5
    wandering_pool:
      - {monster_id: death_knight, weight: 80}
      - {monster_id: banshee, weight: 70}
      - {monster_id: grave_golem, weight: 60}

    monsters:
      - id: death_knight
        name: Death Knight
        description: "A blackened suit of armor moves on its own, the hollow helm glowing with malice."
        hp: 24
        defense: 3
        attack_dice: "1d8"
        attack_bonus: 2
        xp: 22
        gold: [10, 18]
        ai: {attack: 45, heavy: 30, defend: 25}
        loot:
          - {item_id: health_potion, chance: 20}
          - {item_id: insect, chance: 15, type: cross_game_bait}
          - {item_id: shiny_lure, chance: 5, type: cross_game_bait}
          - {item_id: Flickerstone, chance: 7, type: cross_game_ingredient, name: Flickerstone}

      - id: banshee
        name: Banshee
        description: "A wailing spirit whose shriek can stop your heart."
        hp: 16
        defense: 2
        attack_dice: "1d8"
        attack_bonus: 3
        xp: 24
        gold: [8, 16]
        ai: {attack: 50, heavy: 40, defend: 10}
        loot:
          - {item_id: smoke_bomb, chance: 10}
          - {item_id: insect, chance: 15, type: cross_game_bait}
          - {item_id: shiny_lure, chance: 8, type: cross_game_bait}
          - {item_id: Ghostlight Oil, chance: 13, type: cross_game_ingredient, name: Ghostlight Oil}
          - {item_id: Starite Shard, chance: 6, type: cross_game_ingredient, name: Starite Shard}

      - id: grave_golem
        name: Grave Golem
        description: "A hulking construct of tombstone and mortar, cemetery earth cascading from its joints."
        hp: 32
        defense: 3
        attack_dice: "1d6"
        attack_bonus: 3
        xp: 20
        gold: [10, 20]
        ai: {attack: 40, heavy: 20, defend: 40}
        loot:
          - {item_id: worm, chance: 25, type: cross_game_bait}
          - {item_id: Echo Bone, chance: 11, type: cross_game_ingredient, name: Echo Bone}
          - {item_id: Tremor Grub, chance: 6, type: cross_game_ingredient, name: Tremor Grub}

    boss:
      id: the_lich
      name: Varenthos the Undying
      description: "A skeletal figure in moth-eaten robes, a cracked phylactery pulsing in its ribcage. Its voice is a whisper that echoes like thunder."
      hp: 75
      defense: 4
      attack_dice: "1d10"
      attack_bonus: 4
      xp: 85
      gold: [50, 100]
      ai: {attack: 40, heavy: 35, defend: 25}
      loot:
        - {item_id: greataxe, chance: 100, type: gear}
        - {item_id: greater_health_potion, chance: 100}
        - {item_id: insect, chance: 40, type: cross_game_bait}
        - {item_id: shiny_lure, chance: 20, type: cross_game_bait}
        - {item_id: Ghostlight Oil, chance: 28, type: cross_game_ingredient, name: Ghostlight Oil}
        - {item_id: "Hollow King's Sigh", chance: 23, type: cross_game_ingredient, name: "Hollow King's Sigh"}
        - {item_id: Scorchcap Spore, chance: 18, type: cross_game_ingredient, name: Scorchcap Spore}
        - {item_id: "Wyrm's Tear", chance: 13, type: cross_game_ingredient, name: "Wyrm's Tear"}
        - {item_id: war_hammer_plus1, chance: 12, type: gear}
        - {item_id: scale_mail_plus1, chance: 12, type: gear}
        - {item_id: war_hammer_plus2, chance: 4, type: gear}
        - {item_id: scale_mail_plus2, chance: 4, type: gear}

    room_pool:
      - id: sanctum_threshold
        weight: 100
        description_pool:
          - "A vestibule before the sanctum proper. The lintel is carved in the older tongue. The carvings have been painted over by the cathedral, very thinly, and the paint is, in places, peeling away. The carvings beneath are still legible."
        ambient_pool:
          - "It is warmer here than it should be. Not unpleasantly. The way a good library is warm."
        features:
          - id: peeling_paint
            name: "peeling paint on the lintel"
            visibility: visible
            investigate_label: "Pick at the paint"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 9, chance: 1.0}
              - {type: gold, amount: [5, 9], chance: 0.5}
            flavor_success: "_The paint comes off in long strips. Beneath: a page that was glued to the inside of the lintel, written in the older hand. You read it. The handwriting is calm. The handwriting has, in fact, been calm for a very long time._"

      - id: phylactery_chamber
        weight: 100
        description_pool:
          - "The sanctum's heart. A robed figure waits at the lectern. A cracked phylactery pulses in its ribcage with the patience of something that has not been in a hurry for centuries."

      - id: glyph_garden
        weight: 100
        description_pool:
          - "A wide chamber whose floor is laid out in glyphs — not Latin, not the cult tongue, but a third script that resembles both. Some of the glyphs are warm to the touch. Some are not."
        features:
          - id: warm_glyph
            name: "the warmest glyph"
            visibility: visible
            investigate_label: "Press the glyph"
            noise: 2
            content:
              - {type: gold, amount: [8, 14], chance: 1.0}
              - {type: narrate, text: "_The glyph yields. The sound it makes is not heard but felt — a long quiet acknowledgment, the kind a host gives a guest who has finally noticed they are welcome._"}
          - id: cold_glyph_panel
            name: "cold glyph hiding a panel"
            visibility: concealed
            perception_dc: 13
            look_hint: "a glyph that is, alone among them, refusing to warm to your hand"
            investigate_label: "Lift the cold glyph"
            noise: 2
            content:
              - {type: gold, amount: [12, 18], chance: 1.0}
              - {type: item, item_id: greater_health_potion, chance: 0.5}
            flavor_success: "_The cold glyph is hinged. Beneath it: a small offering chamber, the kind a cult would have maintained out of long habit. The contents are still there._"

      - id: royal_carrel
        weight: 100
        description_pool:
          - "A scribe's carrel, but built much larger than scribes need. The desk is the proprietor's; the inkwell is full; the page on the desk is freshly written."
        ambient_pool:
          - "The chair is warm. The scribe stepped away — recently, but not for you. The cathedral, you suspect, is having Sunday mass."
        features:
          - id: fresh_page
            name: "page on the desk"
            visibility: visible
            investigate_label: "Read the page"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 11, chance: 1.0}
              - {type: gold, amount: [6, 11], chance: 0.5}
            flavor_success: "_Two notes by the same priest, written years apart, on the same slip of paper. The priest has been keeping the slip on this desk because he visits, and he visits because he and the proprietor have been friends, and the cathedral does not need to know._"

      - id: oath_room
        weight: 100
        description_pool:
          - "A small chamber whose walls are written floor to ceiling with the names of the cult's faithful. Most are crossed through; the cathedral did its work. Some are not crossed through. Those names are recent."
        features:
          - id: faithful_register
            name: "the wall of names"
            visibility: visible
            investigate_label: "Read the names"
            noise: 2
            content:
              - {type: lore_fragment, fragment_id: 10, chance: 1.0}
              - {type: gold, amount: [4, 8], chance: 0.6}
            flavor_success: "_Most of the names have a single neat strike-through — the cathedral's old purges. A handful have not. The handful are clergy. The handful are still alive._"

      - id: sealed_chamber
        weight: 100
        description_pool:
          - "A small chamber that was sealed, and is no longer. The seal lies neatly aside. Whoever broke the seal did not break it; they retired it. The chamber within has been recently dusted."
        features:
          - id: retired_seal
            name: "the retired seal"
            visibility: visible
            investigate_label: "Examine the seal"
            noise: 1
            content:
              - {type: gold, amount: [10, 14], chance: 0.7}
              - {type: narrate, text: "_The seal is consecrated wax, and it has been laid aside on a small velvet square — the way one would set down a treasured letter, not a barrier. The cathedral did not retire this seal. The proprietor did. With courtesy._"}
          - id: chambered_letter
            name: "letter inside the chamber"
            visibility: secret
            revealed_by: retired_seal
            investigate_label: "Open the letter"
            noise: 1
            content:
              - {type: lore_fragment, fragment_id: 12, chance: 1.0}
              - {type: gold, amount: [12, 18], chance: 1.0}
              - {type: item, item_id: greater_health_potion, chance: 0.5}
            flavor_success: "_The letter inside is addressed simply: 'TO MY SUCCESSOR.' It is not yet sealed. The contents are kind, and brief, and final. You should not read it now. You take a small coin offering from beside it and leave the rest._"

      - id: antechamber
        weight: 100
        description_pool:
          - "An antechamber to the sanctum proper. There is a stone bench, a small water pitcher (full), and on the bench, a folded cloth. Whoever was waiting here was made comfortable. Whoever was waiting here is not waiting any longer."
        ambient_pool:
          - "The chamber smells faintly of an ink that the cathedral does not use."
        features:
          - id: folded_cloth
            name: "the folded cloth"
            visibility: visible
            investigate_label: "Lift the cloth"
            noise: 1
            content:
              - {type: gold, amount: [8, 12], chance: 1.0}
              - {type: item, item_id: greater_health_potion, chance: 0.5}
            flavor_success: "_Beneath the cloth, a small offering of provisions — clearly meant for whoever came next. You take what's offered. Somewhere, very faintly, you have the impression of being thanked._"

      - id: rest_anteroom
        weight: 70
        description_pool:
          - "A small dry alcove just off the antechamber. A second bench. A second pitcher. A single page, weighted with a stone, addressed in the older hand to no one in particular."
        features:
          - id: weighted_page
            name: "the weighted page"
            visibility: visible
            investigate_label: "Read the page"
            noise: 1
            content:
              - {type: item, item_id: greater_health_potion, chance: 1.0}
              - {type: narrate, text: "_The page is a brief blessing in the older tongue. The blessing is meant for travelers. The proprietor has, you realize, made provision for travelers. That is not the relationship you expected to have with a cult king._"}
