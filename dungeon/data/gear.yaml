accessories:
  # Common tier
  - id: iron_ring
    name: Iron Ring
    rarity: common
    effect: {type: max_hp_bonus, value: 4}
    cost: 25
    description: "A plain ring that fortifies your resolve."

  # Uncommon tier
  - id: lucky_charm
    name: Lucky Charm
    rarity: uncommon
    effect: {type: crit_bonus, value: 3}
    cost: 80
    description: "A rabbit's foot. The rabbit wasn't so lucky."
  - id: boots_of_evasion
    name: Boots of Evasion
    rarity: uncommon
    effect: {type: flee_bonus, value: 3}
    cost: 90
    description: "Light boots that make running away feel dignified."

  # Rare tier
  - id: amulet_of_vitality
    name: Amulet of Vitality
    rarity: rare
    effect: {type: max_hp_bonus, value: 10}
    cost: 250
    description: "A warm emerald set in silver. You feel heartier wearing it."
  - id: ring_of_precision
    name: Ring of Precision
    rarity: rare
    effect: {type: crit_bonus, value: 5}
    cost: 280
    description: "Your strikes find weak points you didn't know existed."

  # Epic tier
  - id: cloak_of_shadows
    name: Cloak of Shadows
    rarity: epic
    effect: {type: dodge_bonus, value: 4}
    cost: 500
    description: "Enemies struggle to land a clean hit while you wear this."
