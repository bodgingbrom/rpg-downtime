[pytest]
# Per-mini-game test markers — auto-applied by tests/conftest.py based on
# file path and filename. Run a scoped suite with e.g. `pytest -m fishing`
# or `pytest -m "derby or economy"`. Use the full suite (`pytest`) for
# changes that cross game boundaries or touch shared systems (economy,
# scheduler, db, wallet).
markers =
    brewing: Potion Panic brewing tests
    derby: Downtime Derby racing tests
    dungeon: Monster Mash dungeon tests
    economy: cross-cutting economy / wallet / daily tests
    fishing: Lazy Lures fishing tests
    rpg: player-race / cross-game rpg tests
    admin: admin tooling / reports tests
